<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/jobpilot-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6C5CE7" />
    <meta name="description" content="JobPilot, your AI job-search crew. Agents hunt, analyze, and draft. You approve." />

    <!-- Standalone app behavior when saved to the home screen (hides browser bars) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="JobPilot" />
    <link rel="apple-touch-icon" href="/jobpilot-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/jobpilot-512.png" />
    <title>JobPilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before first paint to avoid a flash.
      // Dark is the default; an explicit saved choice still wins.
      try {
        const saved = localStorage.getItem('jobpilot-theme');
        document.documentElement.dataset.theme = saved || 'dark';
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>
    <style>
      /* Boot splash, shown instantly on launch, removed once React mounts. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface, #f7f6fc);
        transition: opacity 0.35s ease;
      }
      html[data-theme='dark'] #app-splash { background: #100e1c; }
      #app-splash.hide { opacity: 0; pointer-events: none; }
      #app-splash .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      #app-splash img {
        width: 56px;
        height: 56px;
        border-radius: 1rem;
        animation: splash-float 2.4s ease-in-out infinite;
      }
      #app-splash .splash-bar {
        width: 96px;
        height: 4px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(108, 92, 231, 0.18);
      }
      #app-splash .splash-bar span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: #6c5ce7;
        animation: splash-slide 1.1s ease-in-out infinite;
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes splash-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
    </style>
  </head>
  <body>
    <div id="app-splash">
      <div class="splash-inner">
        <img src="/jobpilot-192.png" alt="JobPilot" />
        <div class="splash-bar"><span></span></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
