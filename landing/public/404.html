<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page not found · JobPilot</title>
    <meta name="description" content="This page took a different route. Head back to JobPilot." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
        color: #efedfa;
        background: radial-gradient(60rem 40rem at 50% 0%, #2b2836, #201e29 60%, #1b1924);
        font-family: "Manrope", ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.5rem;
        max-width: 48rem;
        animation: rise 0.5s ease both;
      }
      img {
        width: min(70vw, 16rem);
        height: auto;
        flex-shrink: 0;
        animation: float 5s ease-in-out infinite;
      }
      .copy {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .code {
        font-family: "Sora", "Manrope", sans-serif;
        font-weight: 800;
        font-size: clamp(4.5rem, 18vw, 7rem);
        line-height: 1;
        color: #a78bff;
        text-shadow:
          0 1px 0 #8b7cf0, 0 2px 0 #7d6ee3, 0 3px 0 #6f60d6, 0 4px 0 #6153c4,
          0 5px 0 #5446b0, 0 8px 14px rgba(0, 0, 0, 0.55), 0 0 52px rgba(139, 124, 255, 0.45);
      }
      h1 {
        font-family: "Sora", "Manrope", sans-serif;
        font-weight: 700;
        font-size: clamp(1.3rem, 5vw, 1.75rem);
        margin-top: 0.85rem;
      }
      p {
        margin-top: 0.6rem;
        max-width: 22rem;
        font-size: 0.95rem;
        line-height: 1.6;
        color: #9c98b8;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        padding: 0.85rem 1.6rem;
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.95rem;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(180deg, #8b7cff, #6c5ce7);
        box-shadow: 0 10px 26px -8px rgba(108, 92, 231, 0.7);
        transition: transform 0.15s ease, box-shadow 0.2s ease;
      }
      a.btn:hover { box-shadow: 0 12px 30px -8px rgba(108, 92, 231, 0.85); }
      a.btn:active { transform: scale(0.97); }
      a.btn svg { width: 1.05em; height: 1.05em; }
      @media (min-width: 720px) {
        .wrap { flex-direction: row; gap: 1rem; text-align: left; }
        img { width: 18rem; }
        .copy { align-items: flex-start; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        img, .wrap { animation: none; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <img src="/page_not_found.png" alt="" />
      <div class="copy">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has moved.</p>
        <a class="btn" href="/">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 12H5" /><path d="M12 19l-7-7 7-7" />
          </svg>
          Go Back Home
        </a>
      </div>
    </main>
  </body>
</html>
